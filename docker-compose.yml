version: '3.8'

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: alfadb
      POSTGRES_USER: alfauser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfauser -d alfadb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://alfauser:${DB_PASSWORD}@db:5432/alfadb
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
